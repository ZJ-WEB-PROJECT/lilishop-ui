name: Deploy seller to Server

on:
  push:
    branches:
      - main
    paths:
      - 'seller/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Debug - Check seller directory and lockfile
        run: |
          pwd
          ls -la seller/ || echo "目录 seller/ 不存在或为空"
          ls -la seller/package.json || echo "package.json 不存在"
          ls -la seller/package-lock.json || echo "package-lock.json 不存在！"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '16.20.2'
          package-manager-cache: false  # 关闭缓存，避免路径错误

      - name: Install dependencies
        working-directory: seller
        run: npm ci  # 如果无 lockfile，改回 npm install --force

      - name: Build project
        working-directory: seller
        run: npm run build

      - name: Verify build
        working-directory: seller
        run: ls -l dist

      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: 103.52.152.250
          username: root
          port: 55256
          key: ${{ secrets.YIWU_SELLER }}
          source: seller/dist/*
          target: /home/source/lilishop-ui/seller/dist
          strip_components: 1