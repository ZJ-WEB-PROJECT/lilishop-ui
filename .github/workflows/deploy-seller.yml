name: Deploy seller to Server

on:
  push:
    branches:
      - main
    paths:
      - 'seller/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.20.2'

      - name: Install dependencies
        run: npm install --force

      - name: Build project
        run: npm run build

      # 验证构建输出
      - name: Verify build
        run: ls -l dist

      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: 103.52.152.250
          username: root
          port: 55256
          key: ${{ secrets.YIWU_SELLER }}
          source: seller/dist/*
          target: /home/source/lilishop-ui/seller/dist
          strip_components: 1
