name: Deploy seller to Server

on:
  push:
    branches:
      - main
    paths:
      - 'seller/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 可以保留这个变量作为过渡，但升级 action 后可以移除
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← 升级后可选移除

    steps:
      - name: Checkout code
        uses: actions/checkout@v6   # ← 升级到 v6（或 v5 也行）

      - name: Setup Node.js
        uses: actions/setup-node@v6   # ← 升级到 v6
        with:
          node-version: '16.20.2'     # 你的项目用的是 node 16，保持不变
          cache: 'npm'
          cache-dependency-path: seller/package-lock.json

      - name: Install dependencies
        run: npm install --force
        # 建议改成 npm ci（更干净、可重复），如果 lockfile 干净的话：
        # run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build
        run: ls -l dist

      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: 103.52.152.250
          username: root
          port: 55256
          key: ${{ secrets.YIWU_SELLER }}
          source: seller/dist/*
          target: /home/source/lilishop-ui/seller/dist
          strip_components: 1