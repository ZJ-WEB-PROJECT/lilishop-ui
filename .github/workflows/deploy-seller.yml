name: Deploy seller to Server

on:
  push:
    branches:
      - main
    paths:
      - 'seller/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 升级后可移除

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '16.20.2'
          cache: 'npm'
          cache-dependency-path: seller/package-lock.json
      
      - name: Install dependencies
        working-directory: seller   # ← 加这个，所有 run 都在 seller/ 下执行
        run: npm ci   # 改成 ci 更好，如果 lockfile 存在
      
      - name: Build project
        working-directory: seller
        run: npm run build
      
      - name: Verify build
        working-directory: seller
        run: ls -l dist
      
      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: 103.52.152.250
          username: root
          port: 55256
          key: ${{ secrets.YIWU_SELLER }}
          source: seller/dist/*
          target: /home/source/lilishop-ui/seller/dist
          strip_components: 1