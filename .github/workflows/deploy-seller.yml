name: Deploy seller to Server

on:
  push:
    branches:
      - main
    paths:
      - 'seller/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 升级后可移除

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '16.20.2'
          cache: 'npm'
          cache-dependency-path: seller/package-lock.json  # ← 修复关键

      - name: Install dependencies
        run: npm install --force
        # 更好：如果 lockfile 干净，改成 npm ci（更严格、可重复）
        # run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build
        run: ls -l dist   # 注意：这里 dist 应该在 seller/dist，但 run 默认在根目录，所以可能需要 cd seller 先

      # 如果 ls -l dist 失败（因为你在根目录跑），改成：
      # run: ls -l seller/dist

      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: 103.52.152.250
          username: root
          port: 55256
          key: ${{ secrets.YIWU_SELLER }}
          source: seller/dist/*
          target: /home/source/lilishop-ui/seller/dist
          strip_components: 1