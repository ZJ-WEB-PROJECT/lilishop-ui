name: Deploy seller to Server

on:
  push:
    branches:
      - main
    paths:
      - 'seller/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5   # ← 从 v4 改成 v5

      - name: Setup Node.js
        uses: actions/setup-node@v5  # ← 从 v4 改成 v5
        with:
         node-version: 20          # 或 22 / 24，根据你的项目需要
        cache: 'npm'              # 或 'yarn' / 'pnpm'

      - name: Install dependencies
        run: npm ci


      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: 103.52.152.250
          username: root
          port: 55256
          key: ${{ secrets.YIWU_SELLER }}
          source: seller/dist/*
          target: /home/source/lilishop-ui/seller/dist
          strip_components: 1
